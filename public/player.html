<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video Player Proxy</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
        html, body, iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="player" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        if (videoUrl) {
            document.getElementById('player').src = decodeURIComponent(videoUrl);
        }
    </script>
</body>
</html>
